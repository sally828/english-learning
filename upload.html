<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传外教课程文字稿</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #58a6ff;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-section {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .upload-section h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #e6edf3;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #8b949e;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e6edf3;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #58a6ff;
    }

    textarea {
      min-height: 300px;
      resize: vertical;
      font-family: 'Consolas', 'Monaco', monospace;
      line-height: 1.5;
    }

    .btn {
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2ea043;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: #21262d;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #30363d;
    }

    .result {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 24px;
      margin-top: 20px;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result h3 {
      color: #3fb950;
      margin-bottom: 16px;
    }

    .result p {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .result code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      color: #79c0ff;
      font-size: 13px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #8b949e;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .note {
      background: rgba(88,166,255,0.12);
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #58a6ff;
    }

    .error {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      color: #f85149;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 上传外教课程文字稿</h1>
    <p class="subtitle">将课程文字稿粘贴到下方，系统会自动分析并生成学习报告</p>

    <div class="note">
      💡 提示：请确保文字稿包含完整的对话内容，系统会自动识别语法错误、发音问题和关键词汇。
    </div>

    <div class="upload-section">
      <h2>课程信息</h2>

      <div class="form-group">
        <label for="tutor-name">外教姓名</label>
        <input type="text" id="tutor-name" placeholder="例如：Maxim" value="Maxim">
      </div>

      <div class="form-group">
        <label for="lesson-date">课程日期</label>
        <input type="date" id="lesson-date">
      </div>

      <div class="form-group">
        <label for="duration">课程时长（分钟）</label>
        <input type="text" id="duration" placeholder="例如：49">
      </div>

      <div class="form-group">
        <label for="transcript">课程文字稿</label>
        <textarea id="transcript" placeholder="将腾讯会议的文字稿粘贴到这里..."></textarea>
      </div>

      <button class="btn" onclick="processTranscript()">🚀 开始分析</button>
      <button class="btn btn-secondary" onclick="clearForm()">清空</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在分析课程内容，请稍候...</p>
    </div>

    <div class="result" id="result">
      <h3>✅ 分析完成！</h3>
      <p>课程分析报告已生成。请将以下JSON数据添加到 <code>data/tutor-lessons.json</code> 文件的 <code>lessons</code> 数组中。</p>
      <p>然后刷新主页面即可查看新的课程记录。</p>
    </div>

    <div class="result error" id="error" style="display:none;">
      <h3>❌ 分析失败</h3>
      <p id="error-message"></p>
    </div>
  </div>

  <script>
    // 设置默认日期为今天
    document.getElementById('lesson-date').valueAsDate = new Date();

    function clearForm() {
      document.getElementById('transcript').value = '';
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').style.display = 'none';
    }

    function processTranscript() {
      const tutorName = document.getElementById('tutor-name').value.trim();
      const lessonDate = document.getElementById('lesson-date').value;
      const duration = document.getElementById('duration').value.trim();
      const transcript = document.getElementById('transcript').value.trim();

      // 验证输入
      if (!tutorName || !lessonDate || !duration || !transcript) {
        showError('请填写所有必填字段');
        return;
      }

      // 显示加载状态
      document.getElementById('loading').classList.add('show');
      document.getElementById('result').classList.remove('show');
      document.getElementById('error').style.display = 'none';

      // 模拟处理（实际应该调用AI API）
      setTimeout(() => {
        document.getElementById('loading').classList.remove('show');
        showError('此功能需要连接AI服务进行分析。\n\n请将文字稿发送给Claude Code，让它帮你生成分析报告。\n\n生成的JSON数据会自动添加到 data/tutor-lessons.json 文件中。');
      }, 1500);
    }

    function showError(message) {
      const errorDiv = document.getElementById('error');
      const errorMessage = document.getElementById('error-message');
      errorMessage.textContent = message;
      errorDiv.style.display = 'block';
    }
  </script>
</body>
</html>
